<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>签字大师 · SignPen — 选择文件来源（含扫描文稿）</title>
    <style>
        :root {
            --bg: #f0f2f8;
            --surface: #ffffff;
            --text: #1a1c26;
            --text-secondary: #5a5d6e;
            --text-tertiary: #9093a5;
            --accent: #5856e0;
            --accent-bright: #7c7aff;
            --accent-glow: rgba(88, 86, 224, 0.45);
            --accent-soft: rgba(88, 86, 224, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(0, 0, 0, 0.06);
            --glass-highlight: rgba(255, 255, 255, 0.7);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 36px rgba(0,0,0,0.08);
            --r-sm: 10px;
            --r-md: 18px;
            --font: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --phone-w: 390px;
            --phone-h: 760px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0c15;
                --surface: #151624;
                --text: #eeeff5;
                --text-secondary: #c4c6d4;
                --text-tertiary: #8b8ea3;
                --accent: #7c7aff;
                --accent-bright: #9d9bff;
                --accent-glow: rgba(124, 122, 255, 0.55);
                --accent-soft: rgba(124, 122, 255, 0.12);
                --glass-bg: rgba(255,255,255,0.04);
                --glass-border: rgba(255,255,255,0.07);
                --glass-highlight: rgba(255,255,255,0.05);
            }
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { -webkit-font-smoothing:antialiased; }
        body {
            font-family: var(--font);
            background: #e8ecf3;
            display:flex; align-items:center; justify-content:center;
            min-height:100vh; padding:16px; -webkit-tap-highlight-color:transparent;
            user-select:none; overflow-x:hidden; position:relative;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background: radial-gradient(ellipse at 30% 30%, rgba(120,100,240,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(80,180,220,0.04) 0%, transparent 60%);
            pointer-events:none; z-index:0;
        }
        .ambient-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .orb {
            position:absolute; border-radius:50%; filter:blur(80px); opacity:0.5;
            animation:orbFloat 14s ease-in-out infinite;
        }
        .orb-1 { width:300px; height:300px; background:radial-gradient(circle, rgba(120,100,240,0.45) 0%, transparent 70%); top:-8%; left:-12%; animation-duration:16s; }
        .orb-2 { width:260px; height:260px; background:radial-gradient(circle, rgba(80,180,220,0.35) 0%, transparent 70%); bottom:-10%; right:-15%; animation-delay:-6s; animation-duration:18s; }
        @keyframes orbFloat {
            0%,100% { transform:translate(0,0) scale(1); }
            25% { transform:translate(5%,-3%) scale(1.1); }
            50% { transform:translate(-3%,5%) scale(0.9); }
            75% { transform:translate(-4%,-2%) scale(1.06); }
        }

        .phone-frame {
            position:relative; z-index:2; width:var(--phone-w); height:var(--phone-h); max-height:92vh;
            background:#1a1c24; border-radius:38px; padding:10px;
            box-shadow:0 0 0 2px #2a2d38,0 0 0 5px #15161e,0 0 0 6px #3a3d48,0 18px 55px rgba(0,0,0,0.4);
            display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
        }
        .phone-screen {
            width:100%; height:100%; background:var(--bg); border-radius:28px; overflow:hidden;
            display:flex; flex-direction:column; position:relative;
            box-shadow:inset 0 0 0 1px rgba(255,255,255,0.03); transition:background 0.4s;
        }
        .dynamic-island {
            position:absolute; top:7px; left:50%; transform:translateX(-50%); width:82px; height:22px;
            background:#0d0e14; border-radius:14px; z-index:20;
        }
        .status-bar {
            display:flex; justify-content:space-between; align-items:center; padding:10px 18px 2px;
            font-size:9px; font-weight:600; color:var(--text); letter-spacing:0.03em;
            flex-shrink:0; background:transparent; z-index:8;
        }
        .page-content { flex:1; overflow-y:auto; padding:6px 14px 8px; }
        .page-content::-webkit-scrollbar { display:none; }

        .section-header { padding:8px 0 10px; }
        .section-header h3 { font-size:17px; font-weight:700; color:var(--text); letter-spacing:-0.02em; }
        .section-header p { font-size:10px; color:var(--text-tertiary); margin-top:2px; }

        .source-grid {
            display:grid; grid-template-columns:1fr 1fr; gap:10px;
            margin-top:4px;
        }
        .source-card {
            background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid var(--glass-border); border-radius:var(--r-md); padding:20px 10px;
            box-shadow:var(--shadow-md), inset 0 1px 0 var(--glass-highlight);
            transition:all 0.25s var(--ease-spring); cursor:pointer; text-align:center;
            position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; gap:8px;
        }
        .source-card:active {
            transform:scale(0.96);
            box-shadow:var(--shadow-lg), 0 0 0 1px var(--accent-glow), 0 0 24px var(--accent-glow);
        }
        .source-card::after {
            content:''; position:absolute; top:0; left:15%; right:15%; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            opacity:0; transition:opacity 0.3s; pointer-events:none;
        }
        .source-card:active::after { opacity:0.7; }
        .source-icon {
            width:48px; height:48px; border-radius:var(--r-sm); display:flex; align-items:center;
            justify-content:center; font-size:24px; flex-shrink:0;
        }
        .icon-camera { background:#eef0ff; color:#5856e0; }
        .icon-album { background:#e8faf0; color:#22c55e; }
        .icon-wechat { background:#e8f5e9; color:#07c160; }
        .icon-recent { background:#fef5e7; color:#f5a623; }
        .icon-scan { background:#e8f0fe; color:#2563eb; } /* 扫描文稿专用蓝 */
        .source-label { font-size:13px; font-weight:700; color:var(--text); letter-spacing:0.01em; }
        .source-desc { font-size:9px; color:var(--text-tertiary); line-height:1.3; }

        .bottom-nav {
            display:flex; justify-content:space-around; align-items:center; padding:4px 6px 14px;
            background:var(--glass-bg); backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
            border-top:1px solid var(--glass-border); box-shadow:0 -2px 16px rgba(0,0,0,0.04);
            flex-shrink:0; z-index:15; border-radius:0 0 28px 28px; position:relative;
        }
        .nav-btn {
            display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer;
            padding:4px 5px; border-radius:12px; background:transparent; border:none;
            font-family:var(--font); color:var(--text-tertiary); font-size:8px; font-weight:500;
            letter-spacing:0.03em; transition:all 0.2s; outline:none; min-width:42px;
        }
        .nav-btn svg { width:19px; height:19px; transition:all 0.2s var(--ease-spring); }
        .nav-btn.active { color:var(--accent); font-weight:700; }
        .nav-btn.active svg { filter:drop-shadow(0 0 5px var(--accent-glow)); }
        .nav-btn.central {
            background:var(--accent); color:#fff; border-radius:18px; padding:6px 14px; margin-top:-8px;
            box-shadow:0 4px 16px rgba(88,86,224,0.4); font-weight:700; font-size:9px; letter-spacing:0.04em;
            gap:3px; flex-direction:row; border:2px solid rgba(255,255,255,0.2); position:relative; z-index:2;
        }
        .nav-btn.central svg { width:17px; height:17px; color:#fff; filter:drop-shadow(0 0 4px rgba(255,255,255,0.6)); }
        .nav-btn.central::before {
            content:''; position:absolute; inset:-6px; border-radius:22px; border:2px solid rgba(88,86,224,0.4);
            animation:centralPulse 2s ease-out infinite; pointer-events:none; z-index:-1;
        }
        .nav-btn.central::after {
            content:''; position:absolute; inset:-12px; border-radius:28px; border:1.5px solid rgba(88,86,224,0.2);
            animation:centralPulse 2s ease-out 0.5s infinite; pointer-events:none; z-index:-1;
        }
        @keyframes centralPulse {
            0% { transform:scale(1); opacity:0.8; }
            100% { transform:scale(1.8); opacity:0; }
        }
        .toast {
            position:absolute; top:14px; left:50%; transform:translateX(-50%) translateY(-130px);
            background:#1a1c26; color:#fff; padding:7px 15px; border-radius:16px; font-size:10px;
            font-weight:600; z-index:30; letter-spacing:0.03em; pointer-events:none;
            transition:transform 0.4s var(--ease-spring); white-space:nowrap;
            box-shadow:0 8px 28px rgba(0,0,0,0.4); display:flex; align-items:center; gap:4px;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }

        @media (max-width:430px) {
            .phone-frame { width:96vw; height:auto; aspect-ratio:390/760; border-radius:28px; padding:6px; }
            .phone-screen { border-radius:20px; }
            .dynamic-island { width:56px; height:16px; top:4px; }
        }
    </style>
</head>
<body>

    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="phone-frame">
        <div class="phone-screen">
            <div class="dynamic-island"></div>
            <div class="status-bar">
                <span>9:41</span>
                <span style="display:flex;gap:3px;opacity:0.6;">
                    <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2z"/></svg>
                    <svg width="12" height="7" fill="currentColor" viewBox="0 0 24 24"><rect x="1" y="4" width="20" height="14" rx="2" stroke="currentColor" fill="none" stroke-width="2"/><rect x="2" y="6" width="16" height="10" rx="1" fill="currentColor"/></svg>
                </span>
            </div>

            <div class="page-content">
                <div class="section-header">
                    <h3>选择文件来源</h3>
                    <p>支持多种方式导入待标注的文档</p>
                </div>

                <div class="source-grid">
                    <!-- 拍摄文件 -->
                    <div class="source-card" onclick="showToast('启动相机拍摄文件')">
                        <div class="source-icon icon-camera">📷</div>
                        <span class="source-label">拍摄文件</span>
                        <span class="source-desc">直接拍摄纸质文档</span>
                    </div>
                    <!-- 相册选择 -->
                    <div class="source-card" onclick="showToast('从相册选择图片')">
                        <div class="source-icon icon-album">🖼️</div>
                        <span class="source-label">相册选择</span>
                        <span class="source-desc">选取已有图片或PDF</span>
                    </div>
                    <!-- 微信文件 -->
                    <div class="source-card" onclick="showToast('从微信聊天记录选取')">
                        <div class="source-icon icon-wechat">💬</div>
                        <span class="source-label">微信文件</span>
                        <span class="source-desc">从聊天记录中导入</span>
                    </div>
                    <!-- 扫描文稿（新增） -->
                    <div class="source-card" onclick="showToast('启动扫描文稿功能 · 自动识别A4纸边缘并校正')">
                        <div class="source-icon icon-scan">📑</div>
                        <span class="source-label">扫描文稿</span>
                        <span class="source-desc">自动检测A4纸 · 边缘对齐 · 生成清晰PDF</span>
                    </div>
                    <!-- 最近文件 -->
                    <div class="source-card" onclick="showToast('打开最近使用的文件')" style="grid-column: span 2; flex-direction: row; justify-content: center; gap:12px; padding:14px 10px;">
                        <div class="source-icon icon-recent" style="width:36px;height:36px;font-size:18px;">📁</div>
                        <div style="text-align:left;">
                            <span class="source-label">最近使用的文件</span>
                            <span class="source-desc">快速打开历史文档</span>
                        </div>
                    </div>
                </div>

                <div style="text-align:center; color:var(--text-tertiary); font-size:9px; padding:10px 0;">
                    💡 扫描文稿会自动校正透视与边缘，生成平整的PDF页面
                </div>
            </div>

            <!-- 底部导航（文件页高亮） -->
            <div class="bottom-nav">
                <button class="nav-btn active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    文件
                </button>
                <button class="nav-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    模板
                </button>
                <button class="nav-btn central">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    标注
                </button>
                <button class="nav-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    签名
                </button>
                <button class="nav-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    我的
                </button>
            </div>
            <div class="toast" id="toast"><span>✓</span><span id="toastMsg"></span></div>
        </div>
    </div>
    <script>
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        let timer;
        function showToast(msg) {
            clearTimeout(timer);
            toastMsg.textContent = msg;
            toast.classList.add('show');
            timer = setTimeout(() => toast.classList.remove('show'), 1800);
        }
    </script>
</body>
</html>
