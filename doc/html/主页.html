<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>签字大师 · SignPen — 首页高保真</title>
    <style>
        :root {
            --bg-deep: #f0f2f8;
            --bg-surface: #ffffff;
            --bg-elevated: #f8f9fd;
            --text-primary: #1a1c26;
            --text-secondary: #5a5d6e;
            --text-tertiary: #9093a5;
            --text-quaternary: #c0c3d4;
            --accent: #5856e0;
            --accent-bright: #7c7aff;
            --accent-glow: rgba(88, 86, 224, 0.45);
            --accent-soft: rgba(88, 86, 224, 0.08);
            --success: #22c55e;
            --success-soft: rgba(34, 197, 94, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(0, 0, 0, 0.06);
            --glass-highlight: rgba(255, 255, 255, 0.7);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.08);
            --r-xs: 8px;
            --r-sm: 12px;
            --r-md: 18px;
            --r-lg: 24px;
            --font: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-deep: #0b0c15;
                --bg-surface: #151624;
                --bg-elevated: #1c1e2e;
                --text-primary: #eeeff5;
                --text-secondary: #c4c6d4;
                --text-tertiary: #8b8ea3;
                --text-quaternary: #5c5f75;
                --accent: #7c7aff;
                --accent-bright: #9d9bff;
                --accent-glow: rgba(124, 122, 255, 0.55);
                --accent-soft: rgba(124, 122, 255, 0.12);
                --success: #34d399;
                --success-soft: rgba(52, 211, 153, 0.12);
                --glass-bg: rgba(255, 255, 255, 0.035);
                --glass-border: rgba(255, 255, 255, 0.07);
                --glass-highlight: rgba(255, 255, 255, 0.05);
                --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.5);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: var(--font);
            background: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 18px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
            position: relative;
            transition: background 0.5s var(--ease-smooth);
        }

        /* 动态流光背景 */
        .ambient-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: orbFloat 14s ease-in-out infinite;
            will-change: transform;
        }
        .orb-1 {
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, rgba(120, 100, 240, 0.5) 0%, transparent 70%);
            top: -10%;
            left: -15%;
            animation-duration: 16s;
        }
        .orb-2 {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(80, 180, 220, 0.4) 0%, transparent 70%);
            bottom: -12%;
            right: -18%;
            animation-delay: -5s;
            animation-duration: 18s;
        }
        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(200, 120, 220, 0.35) 0%, transparent 70%);
            top: 40%;
            left: 55%;
            animation-delay: -9s;
            animation-duration: 20s;
        }
        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(6%, -4%) scale(1.12);
            }
            50% {
                transform: translate(-3%, 7%) scale(0.9);
            }
            75% {
                transform: translate(-5%, -3%) scale(1.08);
            }
        }

        /* 漂浮粒子 */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-bright);
            border-radius: 50%;
            opacity: 0;
            animation: particleRise 8s ease-in infinite;
        }
        .particle:nth-child(1) {
            left: 15%;
            animation-delay: 0s;
            animation-duration: 9s;
        }
        .particle:nth-child(2) {
            left: 35%;
            animation-delay: 2s;
            animation-duration: 11s;
        }
        .particle:nth-child(3) {
            left: 55%;
            animation-delay: 4s;
            animation-duration: 7.5s;
        }
        .particle:nth-child(4) {
            left: 72%;
            animation-delay: 1s;
            animation-duration: 10s;
        }
        .particle:nth-child(5) {
            left: 88%;
            animation-delay: 3s;
            animation-duration: 8.5s;
        }
        .particle:nth-child(6) {
            left: 22%;
            animation-delay: 5s;
            animation-duration: 12s;
        }
        @keyframes particleRise {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            15% {
                opacity: 0.8;
            }
            40% {
                opacity: 0.5;
                transform: translateY(50vh) scale(1.5);
            }
            85% {
                opacity: 0.1;
                transform: translateY(5vh) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-20vh) scale(0);
            }
        }

        /* 手机模拟器 */
        .phone-frame {
            position: relative;
            z-index: 2;
            width: 390px;
            height: 760px;
            max-height: 92vh;
            background: #1a1c24;
            border-radius: 42px;
            padding: 13px;
            box-shadow: 0 0 0 2px #2a2d38, 0 0 0 5px #15161e, 0 0 0 6px #3a3d48, 0 24px 70px rgba(0, 0, 0, 0.5), 0 0 120px rgba(88, 86, 224, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.35s var(--ease-smooth);
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background 0.5s var(--ease-smooth);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        }
        .dynamic-island {
            position: absolute;
            top: 9px;
            left: 50%;
            transform: translateX(-50%);
            width: 94px;
            height: 25px;
            background: #0d0e14;
            border-radius: 18px;
            z-index: 20;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 22px 5px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.03em;
            flex-shrink: 0;
            background: transparent;
            z-index: 8;
            transition: color 0.35s var(--ease-smooth);
        }
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 6px 14px 8px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .page-content::-webkit-scrollbar {
            display: none;
        }

        /* 品牌区 */
        .hero-brand {
            text-align: center;
            padding: 8px 0 12px;
        }
        .brand-icon-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }
        .brand-icon {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: linear-gradient(135deg, #5856e0 0%, #8b88f8 30%, #b8b5ff 60%, #5856e0 100%);
            background-size: 300% 300%;
            animation: sigGradient 4s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 40px rgba(88, 86, 224, 0.45), 0 0 0 8px rgba(88, 86, 224, 0.08);
            position: relative;
            z-index: 1;
        }
        .brand-icon::before {
            content: '';
            position: absolute;
            inset: -14px;
            border-radius: 28px;
            border: 2px solid rgba(88, 86, 224, 0.3);
            animation: haloPulse 2.5s ease-out infinite;
            pointer-events: none;
        }
        .brand-icon::after {
            content: '';
            position: absolute;
            inset: -24px;
            border-radius: 34px;
            border: 1.5px solid rgba(88, 86, 224, 0.15);
            animation: haloPulse 2.5s ease-out 0.6s infinite;
            pointer-events: none;
        }
        @keyframes sigGradient {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
        }
        @keyframes haloPulse {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }
        .hero-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.03em;
            transition: color 0.35s var(--ease-smooth);
        }
        .hero-subtitle {
            font-size: 11px;
            color: var(--text-tertiary);
            letter-spacing: 0.04em;
            font-weight: 500;
            margin-top: 2px;
        }

        /* 区块标题 */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2px 0 8px;
        }
        .section-header h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            transition: color 0.35s var(--ease-smooth);
        }
        .badge-pill {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-tertiary);
            background: var(--bg-elevated);
            padding: 5px 10px;
            border-radius: 20px;
            letter-spacing: 0.03em;
        }

        /* 玻璃卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(22px) saturate(150%);
            -webkit-backdrop-filter: blur(22px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-md);
            box-shadow: var(--shadow-md), inset 0 1px 0 var(--glass-highlight);
            transition: all 0.35s var(--ease-smooth);
            position: relative;
            overflow: hidden;
        }
        .glass-card:active {
            transform: scale(0.975);
            box-shadow: var(--shadow-lg), inset 0 1px 0 var(--glass-highlight);
            border-color: rgba(88, 86, 224, 0.3);
            transition: all 0.1s var(--ease-smooth);
        }
        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            opacity: 0;
            transition: opacity 0.35s var(--ease-smooth);
            pointer-events: none;
            z-index: 1;
        }
        .glass-card.neon-active {
            border-color: rgba(88, 86, 224, 0.5);
            box-shadow: var(--shadow-lg), 0 0 0 1px var(--accent-glow), 0 0 24px var(--accent-glow), inset 0 1px 0 var(--glass-highlight);
        }

        /* 文件卡片 */
        .file-card {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 14px 15px;
            margin-bottom: 9px;
            cursor: pointer;
        }
        .status-strip {
            position: absolute;
            left: 0;
            top: 16px;
            bottom: 16px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .file-thumb {
            width: 46px;
            height: 58px;
            border-radius: var(--r-xs);
            background: linear-gradient(145deg, var(--accent-soft) 0%, rgba(88, 86, 224, 0.15) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            border: 1px solid rgba(88, 86, 224, 0.2);
            position: relative;
            overflow: hidden;
        }
        .file-thumb::after {
            content: '';
            position: absolute;
            top: -30%;
            right: -30%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
            border-radius: 50%;
        }
        .file-info {
            flex: 1;
            min-width: 0;
        }
        .file-name {
            font-weight: 700;
            font-size: 13px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.35s var(--ease-smooth);
        }
        .file-meta {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 3px;
            letter-spacing: 0.02em;
        }
        .file-status-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 12px;
            background: var(--success-soft);
            color: var(--success);
            letter-spacing: 0.03em;
            margin-top: 4px;
        }
        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--success);
            animation: statusBreathe 2s ease-in-out infinite;
        }
        @keyframes statusBreathe {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.8);
            }
        }
        .file-chevron {
            color: var(--text-quaternary);
            font-size: 18px;
            flex-shrink: 0;
            font-weight: 300;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: var(--text-tertiary);
            font-size: 12px;
            letter-spacing: 0.02em;
        }
        .empty-icon {
            font-size: 40px;
            margin-bottom: 8px;
            opacity: 0.45;
            animation: floatIcon 3s ease-in-out infinite;
        }
        @keyframes floatIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 5px 8px 14px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-top: 1px solid var(--glass-border);
            box-shadow: 0 -2px 16px rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
            z-index: 15;
            border-radius: 0 0 30px 30px;
            position: relative;
            transition: all 0.35s var(--ease-smooth);
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 5px 6px;
            border-radius: 12px;
            background: transparent;
            border: none;
            font-family: var(--font);
            color: var(--text-tertiary);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.03em;
            transition: all 0.2s var(--ease-smooth);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            min-width: 44px;
        }
        .nav-btn svg {
            width: 19px;
            height: 19px;
            transition: all 0.2s var(--ease-spring);
        }
        .nav-btn.active {
            color: var(--accent);
            font-weight: 700;
        }
        .nav-btn.active svg {
            filter: drop-shadow(0 0 5px var(--accent-glow));
        }
        .nav-btn.central-pulse {
            background: var(--accent);
            color: #fff;
            border-radius: 20px;
            padding: 7px 15px;
            margin-top: -10px;
            box-shadow: 0 6px 22px rgba(88, 86, 224, 0.5);
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.04em;
            gap: 4px;
            flex-direction: row;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 2;
        }
        .nav-btn.central-pulse svg {
            width: 17px;
            height: 17px;
            color: #fff;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.6));
        }
        .nav-btn.central-pulse::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 26px;
            border: 2px solid rgba(88, 86, 224, 0.4);
            animation: centralPulse 2s ease-out infinite;
            pointer-events: none;
            z-index: -1;
        }
        .nav-btn.central-pulse::after {
            content: '';
            position: absolute;
            inset: -16px;
            border-radius: 32px;
            border: 1.5px solid rgba(88, 86, 224, 0.2);
            animation: centralPulse 2s ease-out 0.5s infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes centralPulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }
        .nav-btn.central-pulse:active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(88, 86, 224, 0.3);
            transition: all 0.08s ease;
        }

        /* Toast */
        .toast-pop {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%) translateY(-130px);
            background: #1a1c26;
            color: #fff;
            padding: 9px 18px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            z-index: 30;
            letter-spacing: 0.03em;
            pointer-events: none;
            transition: transform 0.4s var(--ease-spring);
            white-space: nowrap;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .toast-pop.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 440px) {
            .phone-frame {
                width: 100%;
                height: auto;
                min-height: 100vh;
                max-height: none;
                border-radius: 0;
                padding: 0;
                box-shadow: none;
                background: transparent;
            }
            .phone-screen {
                border-radius: 0;
                box-shadow: none;
            }
            .dynamic-island {
                display: none;
            }
            .bottom-nav {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <!-- 动态流光背景 -->
    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="particles">
        <span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span><span class="particle"></span>
    </div>

    <!-- 手机模拟器 -->
    <div class="phone-frame">
        <div class="phone-screen">
            <!-- 灵动岛 -->
            <div class="dynamic-island"></div>
            <!-- 状态栏 -->
            <div class="status-bar">
                <span style="font-weight:700;font-size:12px;">9:41</span>
                <span style="display:flex;gap:4px;align-items:center;opacity:0.8;">
                    <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C17.93 3.93 6.07 3.93 1 9z"/></svg>
                    <svg width="16" height="10" fill="currentColor" viewBox="0 0 24 24"><rect x="1" y="4" width="20" height="14" rx="2" stroke="currentColor" fill="none" stroke-width="2"/><rect x="2" y="6" width="16" height="10" rx="1" fill="currentColor"/></svg>
                </span>
            </div>

            <!-- 页面内容 -->
            <div class="page-content">
                <!-- 品牌区 -->
                <div class="hero-brand">
                    <div class="brand-icon-wrap">
                        <div class="brand-icon">
                            <!-- 图标：笔+纸+签名 -->
                            <svg width="36" height="36" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="10" y="14" width="22" height="26" rx="3" fill="#fff" opacity="0.95" />
                                <line x1="14" y1="22" x2="28" y2="22" stroke="#d0d0e0" stroke-width="1" />
                                <line x1="14" y1="28" x2="26" y2="28" stroke="#d0d0e0" stroke-width="1" />
                                <path d="M14 34 C18 30, 22 38, 28 32" stroke="#1a1c26" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                                <path d="M34 6 L22 18 L22 26 L30 26 L42 14 Z" stroke="#fff" stroke-width="2.5" stroke-linejoin="round" fill="none" />
                                <line x1="30" y1="10" x2="38" y2="4" stroke="#fff" stroke-width="2" stroke-linecap="round" />
                                <circle cx="22" cy="34" r="2.5" fill="#fff" opacity="0.4" />
                            </svg>
                        </div>
                    </div>
                    <div class="hero-title">签字大师</div>
                    <div class="hero-subtitle">SIGNPEN · 光之笔触</div>
                </div>

                <!-- 文件列表标题 -->
                <div class="section-header">
                    <h3>已标注文件</h3>
                    <span class="badge-pill">3 份</span>
                </div>

                <!-- 文件卡片 1 — 带霓虹激活 -->
                <div class="glass-card file-card neon-active">

    <script>
        const toastEl = document.getElementById('toastPop');
        const toastMsgEl = document.getElementById('toastMsg');
        let toastTimer = null;

        function showToast(msg) {
            clearTimeout(toastTimer);
            toastMsgEl.textContent = msg;
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
        }
        document.querySelectorAll('.file-card').forEach(card => {
            card.addEventListener('click', () => showToast('查看文件详情'));
        });
        document.querySelector('.nav-btn.central-pulse').addEventListener('click', () => showToast('✦ 开始新建标注流程 ✦'));
