<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>签字大师 · SignPen — 应用模板</title>
    <style>
        :root {
            --bg: #f0f2f8;
            --surface: #ffffff;
            --text: #1a1c26;
            --text-secondary: #5a5d6e;
            --text-tertiary: #9093a5;
            --accent: #5856e0;
            --accent-bright: #7c7aff;
            --accent-glow: rgba(88, 86, 224, 0.4);
            --accent-soft: rgba(88, 86, 224, 0.08);
            --danger: #e74c5e;
            --success: #22c55e;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(0, 0, 0, 0.06);
            --glass-highlight: rgba(255, 255, 255, 0.7);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 36px rgba(0,0,0,0.08);
            --r-sm: 10px;
            --r-md: 18px;
            --r-lg: 22px;
            --font: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --phone-w: 390px;
            --phone-h: 760px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0c15;
                --surface: #151624;
                --text: #eeeff5;
                --text-secondary: #c4c6d4;
                --text-tertiary: #8b8ea3;
                --accent: #7c7aff;
                --accent-bright: #9d9bff;
                --accent-glow: rgba(124, 122, 255, 0.55);
                --accent-soft: rgba(124, 122, 255, 0.12);
                --glass-bg: rgba(255,255,255,0.04);
                --glass-border: rgba(255,255,255,0.07);
                --glass-highlight: rgba(255,255,255,0.05);
            }
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { -webkit-font-smoothing:antialiased; }
        body {
            font-family: var(--font);
            background: #e8ecf3;
            display:flex; align-items:center; justify-content:center;
            min-height:100vh; padding:16px; -webkit-tap-highlight-color:transparent;
            user-select:none; overflow-x:hidden; position:relative;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background: radial-gradient(ellipse at 20% 30%, rgba(120,100,240,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 75% 65%, rgba(80,180,220,0.04) 0%, transparent 50%);
            pointer-events:none; z-index:0;
        }
        .ambient-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .orb {
            position:absolute; border-radius:50%; filter:blur(70px); opacity:0.45;
            animation:orbFloat 14s ease-in-out infinite;
        }
        .orb-1 { width:280px; height:280px; background:radial-gradient(circle, rgba(120,100,240,0.4) 0%, transparent 70%); top:-5%; left:-10%; animation-duration:16s; }
        .orb-2 { width:240px; height:240px; background:radial-gradient(circle, rgba(80,180,220,0.35) 0%, transparent 70%); bottom:-8%; right:-12%; animation-delay:-5s; animation-duration:18s; }
        @keyframes orbFloat {
            0%,100% { transform:translate(0,0) scale(1); }
            25% { transform:translate(4%,-3%) scale(1.08); }
            50% { transform:translate(-3%,4%) scale(0.92); }
            75% { transform:translate(-3%,-2%) scale(1.05); }
        }

        .phone-frame {
            position:relative; z-index:2; width:var(--phone-w); height:var(--phone-h); max-height:92vh;
            background:#1a1c24; border-radius:38px; padding:10px;
            box-shadow:0 0 0 2px #2a2d38,0 0 0 5px #15161e,0 0 0 6px #3a3d48,0 18px 55px rgba(0,0,0,0.4);
            display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
        }
        .phone-screen {
            width:100%; height:100%; background:var(--bg); border-radius:28px; overflow:hidden;
            display:flex; flex-direction:column; position:relative;
            box-shadow:inset 0 0 0 1px rgba(255,255,255,0.03); transition:background 0.4s;
        }
        .dynamic-island {
            position:absolute; top:7px; left:50%; transform:translateX(-50%); width:82px; height:22px;
            background:#0d0e14; border-radius:14px; z-index:20;
        }
        .status-bar {
            display:flex; justify-content:space-between; align-items:center; padding:10px 18px 2px;
            font-size:9px; font-weight:600; color:var(--text); letter-spacing:0.03em;
            flex-shrink:0; background:transparent; z-index:8;
        }
        .page-content { flex:1; overflow-y:auto; padding:4px 14px 8px; }
        .page-content::-webkit-scrollbar { display:none; }

        /* 顶部导航 */
        .nav-top {
            display:flex; align-items:center; gap:10px; padding:6px 0 10px;
        }
        .btn-back {
            display:flex; align-items:center; justify-content:center; width:32px; height:32px;
            border-radius:50%; background:var(--surface); border:1px solid rgba(0,0,0,0.06);
            color:var(--text-secondary); font-size:16px; cursor:pointer; transition:all 0.2s;
            box-shadow:var(--shadow-sm); flex-shrink:0;
        }
        .btn-back:active { background:#f0f0f5; transform:scale(0.9); }
        .nav-top h3 { font-size:15px; font-weight:700; color:var(--text); }

        /* 模板预览卡片 */
        .preview-card {
            background:var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid var(--glass-border); border-radius:var(--r-md); padding:12px;
            box-shadow:var(--shadow-md), inset 0 1px 0 var(--glass-highlight); margin-bottom:12px;
            position:relative; overflow:hidden;
        }
        .preview-card::after {
            content:''; position:absolute; top:0; left:15%; right:15%; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            opacity:0; pointer-events:none;
        }
        .preview-doc {
            width:100%; height:150px; background:var(--surface); border-radius:var(--r-sm);
            position:relative; border:1px solid rgba(0,0,0,0.04); box-shadow:var(--shadow-sm);
            overflow:hidden; margin-bottom:8px;
        }
        .preview-doc .doc-content {
            padding:14px 12px; display:flex; flex-direction:column; gap:8px; opacity:0.6;
        }
        .preview-doc .doc-line { height:3px; background:#d0d4e0; border-radius:2px; }
        .preview-doc .doc-line.short { width:65%; }
        .preview-doc .doc-line.medium { width:80%; }
        .sig-slot-overlay {
            position:absolute; border:1.5px dashed var(--accent); border-radius:3px;
            background:var(--accent-soft); display:flex; align-items:center; justify-content:center;
            font-size:7px; font-weight:700; color:var(--accent); letter-spacing:0.03em;
            animation:slotPulse 2.5s ease-in-out infinite; z-index:2;
        }
        @keyframes slotPulse {
            0%,100% { border-color:var(--accent); box-shadow:0 0 0 0 rgba(88,86,224,0); }
            40% { border-color:var(--accent-bright); box-shadow:0 0 0 6px rgba(88,86,224,0.1); }
            70% { border-color:var(--accent); box-shadow:0 0 0 0 rgba(88,86,224,0); }
        }
        .preview-info {
            display:flex; justify-content:space-between; align-items:center;
        }
        .preview-info span { font-size:11px; font-weight:600; color:var(--text-secondary); }
        .badge-sm {
            font-size:9px; font-weight:700; color:var(--accent); background:var(--accent-soft);
            padding:3px 8px; border-radius:12px;
        }

        /* 签名位列表 */
        .slot-list { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
        .slot-item {
            background:var(--glass-bg); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
            border:1px solid var(--glass-border); border-radius:var(--r-md); padding:12px 14px;
            box-shadow:var(--shadow-sm), inset 0 1px 0 var(--glass-highlight);
            display:flex; align-items:center; gap:12px; transition:all 0.2s; cursor:pointer;
        }
        .slot-item:active { background:var(--accent-soft); border-color:var(--accent); }
        .slot-icon {
            width:36px; height:36px; border-radius:var(--r-sm); background:var(--accent-soft);
            display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
            color:var(--accent);
        }
        .slot-info { flex:1; }
        .slot-name { font-weight:700; font-size:13px; color:var(--text); }
        .slot-desc { font-size:10px; color:var(--text-tertiary); margin-top:2px; }
        .slot-assign {
            display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:16px;
            background:var(--surface); border:1px solid rgba(0,0,0,0.06); font-size:10px;
            font-weight:600; color:var(--text-secondary); box-shadow:var(--shadow-sm);
            transition:all 0.2s; white-space:nowrap;
        }
        .slot-assign .sig-preview-mini {
            font-family:'Caveat','KaiTi','STKaiti',cursive,serif; font-size:14px; color:var(--text);
        }
        .slot-assign .arrow-down { font-size:8px; color:var(--text-tertiary); }

        /* 底部确认按钮 */
        .btn-apply {
            width:100%; padding:14px; border-radius:var(--r-lg); background:var(--accent);
            color:#fff; font-weight:700; font-size:14px; letter-spacing:0.03em;
            border:none; cursor:pointer; box-shadow:0 6px 22px var(--accent-glow);
            font-family:var(--font); transition:all 0.25s var(--ease-spring);
            display:flex; align-items:center; justify-content:center; gap:6px; margin-top:8px;
        }
        .btn-apply:active { transform:scale(0.95); box-shadow:0 2px 10px rgba(88,86,224,0.2); }

        .toast {
            position:absolute; top:14px; left:50%; transform:translateX(-50%) translateY(-130px);
            background:#1a1c26; color:#fff; padding:7px 15px; border-radius:16px; font-size:10px;
            font-weight:600; z-index:30; letter-spacing:0.03em; pointer-events:none;
            transition:transform 0.4s var(--ease-spring); white-space:nowrap;
            box-shadow:0 8px 28px rgba(0,0,0,0.4); display:flex; align-items:center; gap:4px;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }

        @media (max-width:430px) {
            .phone-frame { width:96vw; height:auto; aspect-ratio:390/760; border-radius:28px; padding:6px; }
            .phone-screen { border-radius:20px; }
            .dynamic-island { width:56px; height:16px; top:4px; }
        }
    </style>
</head>
<body>

    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="phone-frame">
        <div class="phone-screen">
            <div class="dynamic-island"></div>
            <div class="status-bar">
                <span>9:41</span>
                <span style="display:flex;gap:3px;opacity:0.6;">
                    <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2z"/></svg>
                    <svg width="12" height="7" fill="currentColor" viewBox="0 0 24 24"><rect x="1" y="4" width="20" height="14" rx="2" stroke="currentColor" fill="none" stroke-width="2"/><rect x="2" y="6" width="16" height="10" rx="1" fill="currentColor"/></svg>
                </span>
            </div>

            <div class="page-content">
                <!-- 顶部导航 -->
                <div class="nav-top">
                    <button class="btn-back" onclick="history.back()">←</button>
                    <h3>应用模板：采购协议</h3>
                </div>

                <!-- 模板预览 -->
                <div class="preview-card">
                    <div class="preview-doc">
                        <div class="doc-content">
                            <div class="doc-line" style="width:75%"></div>
                            <div class="doc-line" style="width:90%"></div>
                            <div class="doc-line short"></div>
                            <div class="doc-line" style="width:60%"></div>
                            <div class="doc-line" style="width:40%"></div>
                        </div>
                        <div class="sig-slot-overlay" style="bottom:28px;right:16px;width:68px;height:18px;">甲方签字</div>
                        <div class="sig-slot-overlay" style="bottom:8px;right:14px;width:60px;height:18px;">乙方盖章</div>
                    </div>
                    <div class="preview-info">
                        <span>📄 采购协议模板</span>
                        <span class="badge-sm">2个签名位</span>
                    </div>
                </div>

                <!-- 签名位分配列表 -->
                <div class="slot-list">
                    <div class="slot-item" onclick="showToast('更换甲方签名')">
                        <div class="slot-icon">✍️</div>
                        <div class="slot-info">
                            <div class="slot-name">甲方签字</div>
                            <div class="slot-desc">位置：右下区域</div>
                        </div>
                        <div class="slot-assign">
                            <span class="sig-preview-mini">李大明</span>
                            <span class="arrow-down">›</span>
                        </div>
                    </div>
                    <div class="slot-item" onclick="showToast('更换乙方签名')">
                        <div class="slot-icon">🔖</div>
                        <div class="slot-info">
                            <div class="slot-name">乙方盖章</div>
                            <div class="slot-desc">位置：右下方</div>
                        </div>
                        <div class="slot-assign">
                            <span class="sig-preview-mini">公司章</span>
                            <span class="arrow-down">›</span>
                        </div>
                    </div>
                </div>

                <!-- 提示信息 -->
                <div style="font-size:9px; color:var(--text-tertiary); text-align:center; padding:4px 0 8px;">
                    💡 点击签名位可更换素材，默认使用最近使用的签名
                </div>

                <!-- 确认应用按钮 -->
                <button class="btn-apply" onclick="showToast('模板已应用，正在生成标注…')">
                    ✨ 确认应用模板
                </button>
            </div>

            <div class="toast" id="toast"><span>✓</span><span id="toastMsg"></span></div>
        </div>
    </div>
    <script>
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        let timer;
        function showToast(msg) {
            clearTimeout(timer);
            toastMsg.textContent = msg;
            toast.classList.add('show');
            timer = setTimeout(() => toast.classList.remove('show'), 1600);
        }
    </script>
</body>
</html>
