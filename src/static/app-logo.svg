<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5856E0" />
      <stop offset="100%" stop-color="#7C7AFF" />
    </linearGradient>
    <filter id="paperShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Mini Program artwork must be square; the original palette and mark stay unchanged. -->
  <rect width="200" height="200" rx="38" fill="url(#bgGrad)" />
  <circle cx="100" cy="100" r="85" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" />
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="6 6" />

  <g transform="translate(100, 115) rotate(-6) translate(-100, -115)" filter="url(#paperShadow)">
    <rect x="50" y="70" width="75" height="95" rx="6" fill="#ffffff" opacity="0.95" />
    <line x1="60" y1="92" x2="115" y2="92" stroke="#e8e8f0" stroke-width="1.5" />
    <line x1="60" y1="108" x2="115" y2="108" stroke="#e8e8f0" stroke-width="1.5" />
    <line x1="60" y1="124" x2="105" y2="124" stroke="#e8e8f0" stroke-width="1.5" />
  </g>

  <g transform="translate(100, 115) rotate(-6) translate(-100, -115)">
    <path d="M64 124 C72 118, 78 132, 86 122 C94 112, 100 130, 108 118 C112 112, 114 120, 114 128"
      fill="none" stroke="#1a1c26" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M64 134 C80 136, 100 136, 114 134"
      fill="none" stroke="#1a1c26" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="114" cy="128" r="2.5" fill="#1a1c26" />
  </g>

  <g transform="translate(145, 50) rotate(20)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <polygon points="-3,48 0,60 3,48" fill="#ffffff" />
    <polygon points="-1,50 0,58 1,50" fill="#1a1c26" opacity="0.3" />
    <path d="M-1 8 C-16 2, -22 16, -14 22 C-8 26, -4 18, -1 14" fill="#ffffff" opacity="0.85" />
    <path d="M-1 16 C-12 12, -16 24, -10 26 C-6 28, -3 22, -1 18" fill="#ffffff" opacity="0.6" />
    <path d="M1 8 C14 0, 22 12, 14 20 C8 24, 4 16, 1 14" fill="#ffffff" opacity="0.85" />
    <path d="M1 16 C10 10, 16 20, 10 24 C6 26, 3 20, 1 18" fill="#ffffff" opacity="0.6" />
  </g>

  <circle cx="55" cy="55" r="2.5" fill="#ffffff" opacity="0.3" />
  <circle cx="150" cy="140" r="2" fill="#ffffff" opacity="0.25" />
  <circle cx="45" cy="130" r="1.5" fill="#ffffff" opacity="0.2" />
