name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run audit:ci
      - run: npm run ci:check
      - run: npm run build:prod:mp-weixin
        env:
          VITE_MP_WEIXIN_APPID: ${{ secrets.VITE_MP_WEIXIN_APPID }}
      - uses: actions/upload-artifact@v7
        with:
          name: mp-weixin-production
          path: dist/build/mp-weixin
          if-no-files-found: error
          retention-days: 14

  browser-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build:h5
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-failure
          path: test-results
          retention-days: 7
